<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA - Panel de Control</title>
    <style>
        body { 
            background-color: #0d1117; 
            color: #58a6ff; 
            font-family: sans-serif; 
            text-align: center; 
            padding: 10px; 
            margin: 0;
        }
        .panel { 
            border: 2px solid #238636; 
            border-radius: 15px; 
            padding: 10px; 
            background: #161b22; 
            max-width: 350px; /* Un poco más estrecho para que suba todo */
            margin: 10px auto; 
        }
        img { 
            width: 100%; 
            height: auto; 
            border-radius: 10px; 
            border: 2px solid #238636; 
            margin-bottom: 10px; 
        }
        h1 { color: #238636; font-size: 22px; margin: 5px 0; } /* Letras más pequeñas */
        .status-container {
            font-size: 15px; /* Ajuste de tamaño */
            margin-bottom: 10px;
        }
        .status { color: #3fb950; font-weight: bold; }
        hr { border: 0.5px solid #30363d; margin: 10px 0; }
        .footer-text { font-size: 12px; color: #8b949e; padding-bottom: 5px; } /* Texto chiquito */
    </style>
</head>
<body>
    <div class="panel">
        <img src="Camila.jpg" alt="Camila AI">
        <h1>WINFORMATION IA</h1>
        <div class="status-container">
            <p>Avatar: <strong style="color: #58a6ff;">Camila</strong></p>
            <p>Estado: <span class="status">● EN LÍNEA</span></p>
        </div>
        <hr>
        <p class="footer-text">Sistema de Análisis Deportivo y Financiero</p>
    </div>
</body>
</html>
