<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA - Panel de Control</title>
    <style>
        body { background-color: #0d1117; color: #58a6ff; font-family: sans-serif; text-align: center; padding: 20px; }
        .panel { border: 2px solid #238636; border-radius: 15px; padding: 20px; background: #161b22; max-width: 400px; margin: auto; }
        img { width: 150px; height: 150px; border-radius: 50%; border: 3px solid #238636; margin-bottom: 15px; }
        h1 { color: #238636; font-size: 24px; }
        .status { color: #3fb950; font-weight: bold; }
    </style>
</head>
<body>
    <div class="panel">
        <img src="Camila.jpg" alt="Camila AI">
        <h1>WINFORMATION IA</h1>
        <p>Avatar: <strong>Camila</strong></p>
        <p>Estado: <span class="status">EN LÍNEA</span></p>
        <hr style="border: 0.5px solid #30363d;">
        <p style="font-size: 12px; color: #8b949e;">Sistema de Análisis Deportivo y Financiero</p>
    </div>
</body>
</html>
