<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA - Panel de Control</title>
    <style>
        body { background-color: #000; color: #39ff14; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; margin: 0; padding: 20px; }
        .panel-container { background-color: #000; border: 3px solid #39ff14; border-radius: 20px; padding: 25px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 15px rgba(57, 255, 20, 0.7); margin-top: 20px; }
        .camila-frame { width: 180px; height: 180px; border-radius: 50%; border: 4px solid #39ff14; margin: 0 auto 20px; overflow: hidden; box-shadow: 0 0 15px #39ff14; }
        .camila-frame img { width: 100%; height: 100%; object-fit: cover; }
        h1 { color: #39ff14; font-size: 28px; letter-spacing: 2px; margin-bottom: 10px; }
        textarea { width: 100%; height: 120px; background: #111; border: 1px solid #39ff14; color: #fff; border-radius: 10px; padding: 10px; margin: 15px 0; font-family: monospace; box-sizing: border-box; }
        .btn-enviar { background-color: #39ff14; color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; width: 100%; text-transform: uppercase; }
        .footer { margin-top: 20px; color: #666; font-size: 12px; }
    </style>
</head>
<body>

    <h1>WINFORMATION</h1>

    <div class="panel-container">
        <div class="camila-frame">
            <img src="https://raw.githubusercontent.com/2030grecko-spec/winformation-ia/main/image_4.png" alt="Camila IA">
        </div>

        <h3 style="color: #fff; margin: 0;">Panel de Administración (Greco)</h3>
        <p style="font-size: 14px; color: #ccc;">Escribe aquí los resultados o mensajes para Camila:</p>

        <textarea placeholder="Ejemplo: Resultado 2-1, Ganó el equipo A..."></textarea>

        <button class="btn-enviar" onclick="alert('ENVIANDO DATOS A LA NUBE...')">ENVIAR A LA NUBE</button>
    </div>

    <p class="footer">Operado por IA Camila</p>

</body>
</html>
