<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Winformation IA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background-color: #000; color: #d4af37; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .camila-img { width: 140px; height: 140px; border-radius: 50%; border: 3px solid #d4af37; object-fit: cover; box-shadow: 0 0 15px #d4af37; }
        .container { width: 95%; max-width: 450px; background: #111; padding: 25px; border-radius: 15px; border: 1px solid #333; display: flex; flex-direction: column; gap: 15px; }
        input, textarea { background: #000; border: 1px solid #d4af37; padding: 12px; border-radius: 8px; color: #fff; font-size: 1rem; outline: none; }
        button { background: #d4af37; color: #000; padding: 15px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="header">
        <img src="CamilaDelfuro.jpg" alt="Camila" class="camila-img">
        <h1 style="letter-spacing: 2px;">CONTROL PANEL</h1>
    </div>
    <div class="container">
        <input type="text" id="titulo" placeholder="Título del Caramelo">
        <textarea id="mensaje" placeholder="Mensaje para los cazadores..." style="height: 100px;"></textarea>
        <button id="btnEnviar">LANZAR AL APLICATIVO</button>
    </div>
    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyAsS-5Xm09Kk3J-o5f-3vH_N6tSjK9P8",
            authDomain: "winformation-ia.firebaseapp.com",
            databaseURL: "https://winformation-ia-default-rtdb.firebaseio.com",
            projectId: "winformation-ia",
            storageBucket: "winformation-ia.appspot.com",
            messagingSenderId: "30500473215",
            appId: "1:30500473215:web:5d2b67f18b769226c6d267"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        var database = firebase.database();
        document.getElementById('btnEnviar').onclick = function() {
            var t = document.getElementById('titulo').value;
            var m = document.getElementById('mensaje').value;
            if(t === "" || m === "") { alert("Camila dice: No envíes campos vacíos."); return; }
            database.ref('caramelos').push({
                titulo: t, mensaje: m, fecha: new Date().toLocaleString()
            }).then(function() {
                alert("¡Caramelo enviado con éxito!");
                document.getElementById('titulo').value = "";
                document.getElementById('mensaje').value = "";
            }).catch(function(e) { alert("Error: " + e.message); });
        };
    </script>
</body>
</html>
