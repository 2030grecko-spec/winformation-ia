<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA - El Búnker</title>
    <style>
        body { background-color: #000; color: #d4af37; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .camila-viva {
            width: 170px; height: 170px; border-radius: 50%; border: 4px solid #d4af37;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
            animation: latido 3s infinite ease-in-out;
            object-fit: cover;
        }
        @keyframes latido {
            0% { transform: scale(1); box-shadow: 0 0 15px #d4af37; }
            50% { transform: scale(1.05); box-shadow: 0 0 45px #d4af37; }
            100% { transform: scale(1); box-shadow: 0 0 15px #d4af37; }
        }
        .login-box { display: flex; flex-direction: column; gap: 15px; width: 80%; max-width: 300px; margin-top: 25px; }
        input { background: #111; border: 1px solid #d4af37; padding: 12px; border-radius: 8px; color: #fff; outline: none; }
        button { background: #d4af37; color: #000; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <img src="camilaDelfuro.jpg" class="camila-viva" alt="Camila">
    <h1>WINFORMATION IA</h1>
    <div class="login-box">
        <input type="text" id="nombre" placeholder="Nombre de Cazador">
        <input type="email" placeholder="Correo Electrónico">
        <input type="password" placeholder="Contraseña">
        <button onclick="hablar()">ENTRAR AL BÚNKER</button>
    </div>

    <script>
        function hablar() {
            const nombre = document.getElementById('nombre').value;
            const mensaje = new SpeechSynthesisUtterance();
            mensaje.text = "Bienvenido al Búnker " + nombre + ". Sincronizando datos de inteligencia.";
            mensaje.lang = 'es-ES';
            window.speechSynthesis.speak(mensaje);
            setTimeout(() => { alert('Conexión establecida.'); }, 2000);
        }
    </script>
</body>
</html>
