<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WININFORMATION IA</title>
    <style>
        body { background-color: #000; color: #39ff14; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: #111; border: 2px solid #39ff14; border-radius: 20px; padding: 20px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 20px #39ff14; margin-top: 20px; }
        .avatar-frame { width: 200px; height: 200px; border-radius: 50%; border: 4px solid #39ff14; margin: 0 auto 15px; overflow: hidden; box-shadow: 0 0 15px #39ff14; background-color: #222; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-size: 24px; margin-bottom: 5px; text-shadow: 0 0 10px #39ff14; }
        textarea { width: 100%; height: 100px; background: #000; border: 1px solid #39ff14; color: #fff; border-radius: 10px; padding: 10px; margin: 15px 0; box-sizing: border-box; }
        .btn { background-color: #39ff14; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <h1>WINFORMATION IA</h1>
    <div class="container">
        <div class="avatar-frame">
            <img src="https://2030grecko-spec.github.io/winformation-ia/image_4.png" alt="Camila">
        </div>
        <h3 style="color: #fff; margin: 5px;">ADMINISTRADOR: GRECO</h3>
        <textarea placeholder="Ingresa datos para la nube..."></textarea>
        <button class="btn" onclick="alert('DATOS ENVIADOS CON ÉXITO')">ENVIAR A LA NUBE</button>
    </div>
    <p style="margin-top: 20px; font-size: 12px; opacity: 0.6;">SISTEMA OPERADO POR CAMILA IA</p>
</body>
</html>
