<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA</title>
    <style>
        body { background-color: #000; color: #39ff14; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .panel { border: 3px solid #39ff14; border-radius: 25px; padding: 25px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 0 20px #39ff14; background-color: #111; }
        .avatar { width: 160px; height: 160px; border-radius: 50%; border: 4px solid #39ff14; margin: 0 auto 15px; overflow: hidden; box-shadow: 0 0 10px #39ff14; background-color: #222; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        textarea { width: 100%; height: 80px; background: #000; border: 1px solid #39ff14; color: #fff; border-radius: 10px; padding: 10px; margin: 15px 0; box-sizing: border-box; }
        .btn { background-color: #39ff14; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 16px; }
    </style>
</head>
<body>
    <h1 style="font-size: 22px; letter-spacing: 2px;">WININFORMATION IA</h1>
    <div class="panel">
        <div class="avatar">
            <img src="https://raw.githubusercontent.com/2030grecko-spec/winformation-ia/main/536.jpg" onerror="this.src='https://i.postimg.cc/mD8z4y3V/camila.jpg'" alt="Camila">
        </div>
        <h3 style="color:white; margin: 5px 0;">ADMIN: GRECO</h3>
        <textarea placeholder="Datos para la nube..."></textarea>
        <button class="btn" onclick="alert('ENVIADO A LA NUBE')">ENVIAR</button>
    </div>
    <p style="margin-top: 20px; font-size: 10px; opacity: 0.5;">REPOSO ACTIVO - DÍA 1</p>
</body>
</html>
