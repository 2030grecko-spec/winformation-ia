<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA - Panel</title>
    <style>
        body { background-color: #24292e; margin: 0; font-family: monospace; color: #3fb950; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { height: 40%; display: flex; justify-content: center; align-items: center; background: #2d333b; border-bottom: 3px solid #3fb950; }
        .header img { max-height: 90%; max-width: 90%; object-fit: contain; }
        .console { flex: 1; background: #0d1117; padding: 15px; overflow-y: auto; font-size: 14px; }
        .input-area { padding: 10px; background: #1c2128; display: flex; gap: 5px; }
        input { flex: 1; background: #0d1117; border: 1px solid #3fb950; color: #58a6ff; padding: 8px; outline: none; }
        button { background: #3fb950; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><img src="CamilaDelfuro.jpg"></div>
    <div class="console" id="out">> SISTEMA RESTAURADO...<br>> ESPERANDO ÓRDENES EN LOCAL...</div>
    <div class="input-area">
        <input type="text" id="in" placeholder="Escribe aquí...">
        <button onclick="send()">ENVIAR</button>
    </div>
    <script>
        function send() {
            const i = document.getElementById('in');
            const o = document.getElementById('out');
            if(i.value) {
                o.innerHTML += `<br><span style="color:#58a6ff">> ${i.value}</span>`;
                i.value = '';
                o.scrollTop = o.scrollHeight;
            }
        }
    </script>
</body>
</html>
