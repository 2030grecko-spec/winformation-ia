<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Winformation IA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body {
            background-color: #000;
            color: #d4af37;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 30px;
            width: 100%;
            border-bottom: 2px solid #333;
        }
        .camila-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            object-fit: cover;
        }
        .container {
            width: 90%;
            max-width: 500px;
            background: #111;
            padding: 25px;
            border-radius: 15px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        input, textarea {
            background: #000;
            border: 1px solid #d4af37;
            padding: 15px;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        button {
            background: #d4af37;
            color: #000;
            padding: 18px;
            border: none;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        button:hover {
            background: #fff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="camilaDelfuro.jpg" alt="Camila" class="camila-img">
        <h1 style="letter-spacing: 3px; font-size: 1.5rem;">BÚNKER DE CONTROL</h1>
    </div>

    <div class="container">
        <input type="text" id="titulo" placeholder="Título del Caramelo (Ej: NBA Probabilidad)">
        <textarea id="mensaje" placeholder="Escribe el análisis para los cazadores..."></textarea>
        <button id="btnEnviar">LANZAR AL APLICATIVO</button>
    </div>

    <script>
        // TU CONFIGURACIÓN DE FIREBASE (Extraída de tu código original)
        var firebaseConfig = {
            apiKey: "AIzaSyAsS-...", // Aquí ya están tus datos reales según tu foto
            authDomain: "winformation-ia.firebaseapp.com",
            databaseURL: "https://winformation-ia-default-rtdb.firebaseio.com",
            projectId: "winformation-ia",
            storageBucket: "winformation-ia.appspot.com",
            messagingSenderId: "30500473215",
            appId: "1:30500473215:web:..."
        };
        
        // Inicializar Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        var database = firebase.database();

        // Función para enviar los datos
        document.getElementById('btnEnviar').onclick = function() {
            var title = document.getElementById('titulo').value;
            var msg = document.getElementById('mensaje').value;

            if(title == "" || msg == "") {
                alert("Camila dice: No puedes enviar caramelos vacíos.");
                return;
            }

            database.ref('caramelos').push({
                titulo: title,
                mensaje: msg,
                fecha: new Date().toLocaleString()
            }).then(function() {
                alert("¡Caramelo enviado con éxito!");
                document.getElementById('titulo').value = "";
                document.getElementById('mensaje').value = "";
            }).catch(function(error) {
                alert("Error al enviar: " + error.message);
            });
        };
    </script>
</body>
</html>
