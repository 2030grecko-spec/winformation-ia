<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA</title>
    <style>
        body { background-color: #000; color: #39ff14; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .panel { border: 2px solid #39ff14; border-radius: 20px; padding: 20px; width: 280px; text-align: center; background: #050505; box-shadow: 0 0 15px #39ff14; }
        .avatar { width: 150px; height: 150px; border-radius: 50%; border: 3px solid #39ff14; margin: 0 auto 15px; overflow: hidden; box-shadow: 0 0 10px #39ff14; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .btn { background: #39ff14; color: #000; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="panel">
        <div class="avatar">
            <img src="camila.jpg" alt="Camila">
        </div>
        <h2>WININFORMATION IA</h2>
        <p style="font-size: 12px; color: #fff;">ADMIN: GRECO</p>
        <button class="btn">ACCEDER A DATOS</button>
    </div>
</body>
</html>
