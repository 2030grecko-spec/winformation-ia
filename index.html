<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Winformation IA</title>
    <style>
        body { background-color: #24292e; margin: 0; font-family: monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Camila ahora es pequeñita para que TODO suba */
        .impact-zone { 
            width: 100%; 
            height: 25vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #2d333b; 
            border-bottom: 3px solid #3fb950; 
        }
        .impact-zone img { max-height: 90%; max-width: 90%; object-fit: contain; }
        
        .control-panel { flex: 1; background: #1c2128; padding: 10px; display: flex; flex-direction: column; }
        
        .console-screen { 
            background: #0d1117; 
            border: 2px solid #3fb950; 
            border-radius: 8px; 
            padding: 10px; 
            font-size: 14px; 
            color: #58a6ff; 
            overflow-y: auto; 
            flex-grow: 1;
            margin-bottom: 15px; 
        }

        /* Caja de entrada y botones BIEN ARRIBA */
        .input-box { 
            display: flex; 
            gap: 8px; 
            background: #2d333b; 
            padding: 10px; 
            border: 3px solid #3fb950; 
            border-radius: 15px;
            margin-bottom: 20px; /* Separación del borde de abajo */
        }
        input { background: transparent; border: none; color: #fff; flex: 1; padding: 5px; outline: none; font-size: 16px; min-width: 0; }
        button { background: #3fb950; border: none; color: #000; padding: 10px 15px; border-radius: 10px; font-weight: bold; }
        .btn-clear { background: #f85149; color: #fff; }
    </style>
</head>
<body>
    <div class="impact-zone">
        <img src="./CamilaDelfuro.jpg" alt="Winformation IA">
    </div>
    <div class="control-panel">
        <div class="console-screen" id="log">
            <div style="color: #3fb950;">> PANEL ACTUALIZADO...</div>
        </div>
        <div class="input-box">
            <input type="text" id="command" placeholder="ESCRIBE AQUÍ..." autocomplete="off">
            <button onclick="send()">OK</button>
            <button class="btn-clear" onclick="borrar()">🗑️</button>
        </div>
    </div>
    <script>
        const log = document.getElementById('log');
        const cmd = document.getElementById('command');
        function send() {
            if(cmd.value.trim() !== "") {
                log.innerHTML += `<div style="color:#58a6ff">> ${cmd.value}</div>`;
                cmd.value = "";
                log.scrollTop = log.scrollHeight;
            }
        }
        function borrar() { log.innerHTML = `<div style="color: #3fb950;">> MEMORIA LIMPIA...</div>`; }
        cmd.addEventListener("keypress", (e) => { if (e.key === "Enter") send(); });
    </script>
</body>
</html>
