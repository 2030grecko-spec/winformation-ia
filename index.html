<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA - Registro</title>
    <style>
        body {
            background-color: #000;
            color: #d4af37; /* Dorado */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .camila-container {
            width: 150px;
            height: 150px;
            border: 3px solid #d4af37;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .camila-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 { font-size: 1.5rem; margin-bottom: 30px; letter-spacing: 2px; }

        .form-group {
            width: 80%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            background: #1a1a1a;
            border: 1px solid #d4af37;
            padding: 12px;
            border-radius: 8px;
            color: #fff;
            outline: none;
        }

        button {
            background: #d4af37;
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover { background: #fff; }
    </style>
</head>
<body>

    <div class="camila-container">
        <img src="camila.jpg" alt="Camila AI">
    </div>

    <h1>WINFORMATION IA</h1>

    <div class="form-group">
        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="registrar()">ENTRAR AL BÚNKER</button>
    </div>

</body>
</html>
