<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA</title>
    <style>
        body { background-color: #000; color: #39ff14; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; margin: 0; padding: 20px; }
        .panel { border: 3px solid #39ff14; border-radius: 25px; padding: 25px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 20px #39ff14; background-color: #111; margin-top: 20px; }
        .avatar { width: 180px; height: 180px; border-radius: 50%; border: 4px solid #39ff14; margin: 0 auto 15px; overflow: hidden; box-shadow: 0 0 10px #39ff14; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        textarea { width: 100%; height: 100px; background: #000; border: 1px solid #39ff14; color: #fff; border-radius: 10px; padding: 10px; margin: 15px 0; box-sizing: border-box; font-size: 16px; }
        .btn { background-color: #39ff14; color: #000; border: none; padding: 18px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 18px; }
    </style>
</head>
<body>
    <h1 style="letter-spacing: 3px;">WININFORMATION IA</h1>
    <div class="panel">
        <div class="avatar">
            <img src="536.jpg" alt="Camila">
        </div>
        <h3 style="color:white; margin: 10px 0;">ADMIN: GRECO</h3>
        <p style="color: #39ff14; font-size: 14px;">Panel de Control y Cursos</p>
        <textarea placeholder="Ingresa datos para Camila..."></textarea>
        <button class="btn" onclick="alert('DATOS ENVIADOS A LA NUBE')">ENVIAR A LA NUBE</button>
    </div>
    <p style="margin-top: 25px; font-size: 10px; opacity: 0.5;">SISTEMA OPERADO POR CAMILA IA</p>
</body>
</html>
