<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA - Panel Administrativo</title>
    <style>
        body { background-color: #000; color: #39ff14; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .panel { border: 2px solid #39ff14; border-radius: 20px; padding: 20px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 0 15px #39ff14; background: #050505; }
        .avatar { width: 150px; height: 150px; border-radius: 50%; border: 3px solid #39ff14; margin: 0 auto 15px; overflow: hidden; box-shadow: 0 0 10px #39ff14; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        h2 { font-size: 18px; margin: 10px 0; letter-spacing: 1px; }
        .status { font-size: 12px; color: #fff; margin-bottom: 15px; opacity: 0.8; }
        .btn { background: #39ff14; color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="panel">
        <div class="avatar">
            <img src="https://i.ibb.co/VWVh6vH/camila-verde.jpg" alt="Camila">
        </div>
        <h2>WININFORMATION IA</h2>
        <div class="status">ADMIN: GRECO (SESIÓN ACTIVA)</div>
        <p style="font-size: 11px;">PROYECTO: CURSO 41 - MÓDULO NUBE</p>
        <button class="btn">ACCEDER A DATOS</button>
    </div>
</body>
</html>
