<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA - Portal de Inteligencia</title>
    <style>
        body {
            background-color: #000;
            color: #d4af37; /* Dorado Élite */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* El Búnker de Camila con Vida */
        .camila-container {
            width: 160px;
            height: 160px;
            border: 3px solid #d4af37;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            
            /* Animación de Latido de Inteligencia */
            animation: pulse-aura 3s infinite ease-in-out, entrance 1.2s ease-out;
            position: relative;
        }

        .camila-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Animaciones */
        @keyframes pulse-aura {
            0% { box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 35px rgba(212, 175, 55, 0.8); transform: scale(1.02); }
            100% { box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); transform: scale(1); }
        }

        @keyframes entrance {
            from { opacity: 0; transform: scale(0.8) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h1 { 
            font-size: 1.4rem; 
            margin-bottom: 35px; 
            letter-spacing: 4px; 
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            text-transform: uppercase;
        }

        .login-box {
            width: 85%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            animation: entrance 1.5s ease-out;
        }

        input {
            background: #111;
            border: 1px solid #d4af37;
            padding: 14px;
            border-radius: 10px;
            color: #fff;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus { border-color: #fff; box-shadow: 0 0 12px rgba(212, 175, 55, 0.6); }

        button {
            background: linear-gradient(135deg, #d4af37, #f2d06b);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 15px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.4s;
        }

        button:hover { 
            background: #fff; 
            transform: translateY(-3px); 
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.6); 
        }
    </style>
</head>
<body>

    <div class="camila-container">
        <img src="camilaDelfuro.jpg" alt="Camila AI">
    </div>

    <h1>Winformation IA</h1>

    <div class="login-box">
        <input type="text" id="user_name" placeholder="Nombre de Cazador">
        <input type="email" id="user_email" placeholder="Correo Electrónico">
        <input type="password" id="user_pass" placeholder="Contraseña">
        <button onclick="acceder()">Entrar al Búnker</button>
    </div>

    <script>
        function acceder() {
            const name = document.getElementById('user_name').value;
            if(name) {
                alert('Sincronizando con Camila... Bienvenido, ' + name);
                // Aquí conectaremos luego con tu Firebase para guardar al usuario
            } else {
                alert('Camila necesita saber quién eres. Ingresa tu nombre.');
            }
        }
    </script>

</body>
</html>
