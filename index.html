<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, landscape-only">
    <title>Winformation AI | The Bunker</title>
    <style>
        body { margin: 0; background: #000; color: #D4AF37; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .matrix-bg { position: fixed; top: 0; width: 100%; height: 100%; opacity: 0.15; z-index: -1; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        h1 { font-size: 3rem; letter-spacing: 5px; text-shadow: 0 0 20px #D4AF37; }
        .enter-btn { 
            padding: 20px 40px; border: 2px solid #D4AF37; background: transparent; 
            color: #D4AF37; cursor: pointer; font-weight: bold; font-size: 1.2rem;
            transition: 0.5s; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
        .enter-btn:hover { background: #D4AF37; color: #000; box-shadow: 0 0 30px #D4AF37; }
    </style>
</head>
<body>
    <canvas id="matrix" class="matrix-bg"></canvas>
    <div class="hero">
        <h1>WINFORMATION AI</h1>
        <p>"Don't be a sardine. Become a Hunter."</p>
        <button class="enter-btn" onclick="location.href='usuario.html'">ENTER THE BUNKER</button>
    </div>

    <script>
        // Lógica simple de lluvia Matrix para el fondo
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "WINFORMATIONAI0101";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#D4AF37"; 
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);
    </script>
</body>
</html>
