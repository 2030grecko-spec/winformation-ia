<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA - Panel de Control</title>
    <style>
        body { background-color: #24292e; margin: 0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .impact-zone { width: 100%; height: 55%; display: flex; justify-content: center; align-items: center; background: #2d333b; border-bottom: 5px solid #3fb950; transition: height 0.3s; }
        .impact-zone img { max-width: 100%; max-height: 100%; object-fit: contain; }
        body:focus-within .impact-zone { height: 30%; } /* Esto encoge la imagen para el teclado */
        .control-panel { flex: 1; background: #1c2128; padding: 15px; display: flex; flex-direction: column; }
        .console-screen { background: #0d1117; border: 2px solid #3fb950; border-radius: 10px; padding: 12px; font-size: 14px; color: #58a6ff; overflow-y: auto; margin-bottom: 15px; flex-grow: 1; }
        .input-box { display: flex; gap: 10px; background: #2d333b; padding: 10px; border: 4px solid #3fb950; border-radius: 20px; }
        input { background: transparent; border: none; color: #fff; flex: 1; padding: 10px; outline: none; font-size: 16px; min-width: 0; }
        button { background: #3fb950; border: none; color: #000; padding: 10px 15px; border-radius: 12px; font-weight: bold; }
        .btn-clear { background: #f85149; color: white; }
    </style>
</head>
<body>
    <div class="impact-zone">
        <img src="CamilaDelfuro.jpg" alt="Winformation IA">
    </div>
    <div class="control-panel">
        <div class="console-screen" id="log">
            <div style="color: #3fb950;">> SISTEMA WINFORMATION VINCULADO...</div>
            <div style="color: #3fb950;">> ESTADO: OPERATIVO</div>
        </div>
        <div class="input-box">
            <input type="text" id="command" placeholder="ESCRIBE AQUÍ..." autocomplete="off">
            <button onclick="send()">ENVIAR</button>
            <button class="btn-clear" onclick="limpiar()">🗑️</button>
        </div>
    </div>
    <script>
        function send() {
            const cmd = document.getElementById('command');
            const log = document.getElementById('log');
            if(cmd.value.trim() !== "") {
                log.innerHTML += `<div style="color:#58a6ff">> NUBE: ${cmd.value}</div>`;
                cmd.value = "";
                log.scrollTop = log.scrollHeight;
            }
        }
        function limpiar() {
            document.getElementById('log').innerHTML = '<div style="color: #3fb950;">> SISTEMA REINICIADO...</div>';
        }
    </script>
</body>
</html>
