<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Winformation IA - Panel Real</title>
    <style>
        body { background-color: #24292e; margin: 0; font-family: monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .impact-zone { width: 100%; height: 25vh; display: flex; justify-content: center; align-items: center; background: #2d333b; border-bottom: 3px solid #3fb950; flex-shrink: 0; }
        .impact-zone img { max-height: 90%; max-width: 90%; object-fit: contain; }
        .control-panel { flex: 1; background: #1c2128; padding: 10px; display: flex; flex-direction: column; overflow: hidden; }
        .console-screen { background: #0d1117; border: 2px solid #3fb950; border-radius: 8px; padding: 10px; font-size: 14px; color: #58a6ff; overflow-y: auto; height: 50vh; margin-bottom: 10px; }
        .input-box { display: flex; gap: 8px; background: #2d333b; padding: 10px; border: 3px solid #3fb950; border-radius: 15px; flex-shrink: 0; }
        input { background: transparent; border: none; color: #fff; flex: 1; padding: 5px; outline: none; font-size: 16px; min-width: 0; }
        button { background: #3fb950; border: none; color: #000; padding: 10px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-clear { background: #f85149; color: #fff; }
    </style>
</head>
<body>
    <div class="impact-zone">
        <img src="./CamilaDelfuro.jpg" alt="Winformation IA">
    </div>
    <div class="control-panel">
        <div class="console-screen" id="log">
            <div style="color: #3fb950;">> CONECTADO A WINFORMATION-IA...</div>
        </div>
        <div class="input-box">
            <input type="text" id="command" placeholder="ESCRIBE O PEGA EL CURSO..." autocomplete="off">
            <button id="btnSend">OK</button>
            <button class="btn-clear" onclick="borrar()">🗑️</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Tu llave que acabas de copiar
        const firebaseConfig = {
            apiKey: "AIzaSyB0yH9KCEL5WDcj9Aqnw4WyN2JruZDz1DQ",
            authDomain: "winformation-ia.firebaseapp.com",
            databaseURL: "https://winformation-ia-default-rtdb.firebaseio.com",
            projectId: "winformation-ia",
            storageBucket: "winformation-ia.firebasestorage.app",
            messagingSenderId: "152740731727",
            appId: "1:152740731727:web:e5b581986293fe57e2433a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const logRef = ref(db, 'cursos');

        const log = document.getElementById('log');
        const cmd = document.getElementById('command');
        const btn = document.getElementById('btnSend');

        // Función para enviar a la Nube
        window.send = () => {
            if(cmd.value.trim() !== "") {
                push(logRef, { texto: cmd.value, fecha: Date.now() });
                cmd.value = "";
            }
        };

        // Escuchar la Nube en tiempo real
        onChildAdded(logRef, (snapshot) => {
            const data = snapshot.val();
            log.innerHTML += `<div style="color:#58a6ff; margin-bottom: 10px; white-space: pre-wrap;">> ${data.texto}</div>`;
            log.scrollTop = log.scrollHeight;
        });

        btn.addEventListener("click", send);
        cmd.addEventListener("keypress", (e) => { if (e.key === "Enter") send(); });
        window.borrar = () => { log.innerHTML = `<div style="color: #3fb950;">> MEMORIA LIMPIA...</div>`; };
    </script>
</body>
</html>
