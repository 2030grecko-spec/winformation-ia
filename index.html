<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Winformation IA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body style="background-color: #000; color: #d4af37; font-family: sans-serif; text-align: center; padding: 20px;">

    <div style="margin-bottom: 25px;">
        <img src="camilaDelfuro.jpg" alt="Camila" style="width: 140px; height: 140px; border-radius: 50%; border: 3px solid #d4af37; object-fit: cover;">
        <h1 style="letter-spacing: 2px;">BÚNKER DE CONTROL</h1>
    </div>

    <div style="display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto; background: #111; padding: 20px; border-radius: 10px;">
        <input type="text" id="titulo" placeholder="Título" style="padding: 12px; background: #000; color: #fff; border: 1px solid #d4af37;">
        <textarea id="mensaje" placeholder="Mensaje..." style="padding: 12px; background: #000; color: #fff; border: 1px solid #d4af37; height: 100px;"></textarea>
        <button id="btnEnviar" style="background: #d4af37; color: #000; padding: 15px; font-weight: bold; cursor: pointer; border: none;">LANZAR AL APLICATIVO</button>
    </div>

    <script>
        // CONFIGURACIÓN REAL SEGÚN TUS FOTOS
        var firebaseConfig = {
            apiKey: "AIzaSyAsS-5Xm09Kk3J-o5f-3vH_N6tSjK9P8",
            authDomain: "winformation-ia.firebaseapp.com",
            databaseURL: "https://winformation-ia-default-rtdb.firebaseio.com",
            projectId: "winformation-ia",
            storageBucket: "winformation-ia.appspot.com",
            messagingSenderId: "30500473215",
            appId: "1:30500473215:web:5d2b67f18b769226c6d267"
        };
        
        firebase.initializeApp(firebaseConfig);
        var database = firebase.database();

        document.getElementById('btnEnviar').onclick = function() {
            var t = document.getElementById('titulo').value;
            var m = document.getElementById('mensaje').value;

            if(t == "" || m == "") {
                alert("Escribe algo, socio.");
                return;
            }

            // Enviando a la base de datos
            database.ref('caramelos').push({
                titulo: t,
                mensaje: m,
                fecha: new Date().toLocaleString()
            }).then(function() {
                alert("¡Enviado con éxito!");
                document.getElementById('titulo').value = "";
                document.getElementById('mensaje').value = "";
            }).catch(function(e) {
                alert("Error: " + e.message);
            });
        };
    </script>
</body>
</html>
