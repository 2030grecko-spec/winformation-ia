<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* FONDO GRIS ACERO - NADA DE NEGRO */
        body { background-color: #24292e; margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .impact-zone { width: 100%; height: 55%; display: flex; justify-content: center; align-items: center; background: #2d333b; border-bottom: 4px solid #3fb950; }
        .impact-zone img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .control-panel { flex: 1; background: #1c2128; padding: 15px; display: flex; flex-direction: column; }
        
        .console-screen { background: #0d1117; border: 2px solid #3fb950; border-radius: 10px; padding: 10px; flex-grow: 1; color: #58a6ff; overflow-y: auto; margin-bottom: 10px; box-shadow: 0 0 15px rgba(63, 185, 80, 0.3); }
        
        /* RECUADRO VERDE ELÉCTRICO */
        .input-box { display: flex; background: #22272e; padding: 5px; border: 3px solid #3fb950; border-radius: 15px; box-shadow: 0 0 15px #3fb950; }
        input { background: transparent; border: none; color: #fff; flex: 1; padding: 10px; outline: none; font-size: 16px; }
        button { background: #3fb950; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; color: #000; }
    </style>
</head>
<body>
    <div class="impact-zone">
        <img src="CamilaDelfuturo.jpg" alt="Winformation IA">
    </div>
    <div class="control-panel">
        <div class="console-screen" id="log">
            <div style="color: #3fb950;">> SISTEMA VINCULADO...</div>
        </div>
        <div class="input-box">
            <input type="text" id="cmd" placeholder="Escribe aquí...">
            <button onclick="send()">ENVIAR</button>
        </div>
    </div>
    <script>
        function send() {
            const i = document.getElementById('cmd');
            const l = document.getElementById('log');
            if(i.value) {
                l.innerHTML += `<div style="color:#58a6ff">> DATOS: ${i.value}</div>`;
                i.value = "";
                l.scrollTop = l.scrollHeight;
            }
        }
    </script>
</body>
</html>
