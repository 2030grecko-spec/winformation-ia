<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WININFORMATION IA</title>
    <style>
        body { background-color: #000; color: #39ff14; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: #000; border: 3px solid #39ff14; border-radius: 20px; padding: 25px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 15px #39ff14; margin-top: 20px; }
        .avatar-frame { width: 180px; height: 180px; border-radius: 50%; border: 4px solid #39ff14; margin: 0 auto 20px; overflow: hidden; box-shadow: 0 0 15px #39ff14; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-size: 28px; letter-spacing: 2px; }
        textarea { width: 100%; height: 100px; background: #111; border: 1px solid #39ff14; color: #fff; border-radius: 10px; padding: 10px; margin: 15px 0; box-sizing: border-box; }
        .btn { background-color: #39ff14; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <h1>WINFORMATION</h1>
    <div class="container">
        <div class="avatar-frame">
            <img src="https://raw.githubusercontent.com/2030grecko-spec/winformation-ia/main/image_4.png" alt="Camila">
        </div>
        <h3 style="color: #fff; margin: 0;">ADMIN: GRECO</h3>
        <textarea placeholder="Datos para la nube..."></textarea>
        <button class="btn" onclick="alert('DATOS ENVIADOS')">ENVIAR A LA NUBE</button>
    </div>
</body>
</html>
