<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA - Terminal de Mando</title>
    <style>
        body { background-color: #000; margin: 0; padding: 0; font-family: 'Courier New', monospace; color: #3fb950; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* ORBE SUPERIOR */
        .orb-zone { width: 100%; height: 50%; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #1a1a1a 0%, #000 70%); position: relative; border-bottom: 2px solid #238636; }
        .crystal-orb { width: 75vw; height: 75vw; max-width: 350px; max-height: 350px; border-radius: 50%; position: relative; overflow: hidden; border: 2px solid rgba(63, 185, 80, 0.5); box-shadow: 0 0 30px rgba(35, 134, 54, 0.6); }
        .crystal-orb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.95; }

        /* PANEL DE CONTROL Y ENTRADA */
        .control-panel { flex: 1; background: #0d1117; padding: 15px; display: flex; flex-direction: column; }
        .console-output { background: #000; border: 1px solid #238636; border-radius: 5px; padding: 10px; flex-grow: 1; font-size: 12px; overflow-y: auto; margin-bottom: 10px; box-shadow: inset 0 0-10px #238636; }
        
        /* AQUÍ ESCRIBES TÚ */
        .input-area { display: flex; gap: 5px; background: #161b22; padding: 5px; border-radius: 5px; border: 1px solid #30363d; }
        input { background: transparent; border: none; color: #fff; flex: 1; padding: 10px; font-family: inherit; outline: none; }
        button { background: #238636; border: none; color: white; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        .brand { font-size: 18px; text-align: center; margin-bottom: 5px; color: #3fb950; text-shadow: 0 0 5px #238636; }
    </style>
</head>
<body>

    <div class="orb-zone">
        <div class="crystal-orb">
            <img src="Camila.jpg" alt="Camila AI">
        </div>
    </div>

    <div class="control-panel">
        <div class="brand">WINFORMATION IA - CONSOLA</div>
        
        <div class="console-output" id="output">
            <div>> SISTEMA INICIADO...</div>
            <div>> ESPERANDO COMANDOS DE J.G.L.M...</div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Escribe aquí tu orden...">
            <button onclick="sendCommand()">ENVIAR</button>
        </div>
    </div>

    <script>
        function sendCommand() {
            const input = document.getElementById('userInput');
            const output = document.getElementById('output');
            if(input.value.trim() !== "") {
                output.innerHTML += `<div style="color: #58a6ff;">> TÚ: ${input.value}</div>`;
                output.innerHTML += `<div>> CAMILA: Procesando datos en M y F...</div>`;
                input.value = "";
                output.scrollTop = output.scrollHeight;
            }
        }
    </script>

</body>
</html>
