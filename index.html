<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA - Panel de Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body style="background-color: #000; color: #d4af37; font-family: sans-serif; text-align: center; padding: 20px;">

    <div style="margin-bottom: 30px;">
        <img src="camilaDelfuro.jpg" alt="Camila" style="width: 140px; height: 140px; border-radius: 50%; border: 4px solid #d4af37; object-fit: cover; box-shadow: 0 0 20px rgba(212,175,55,0.5);">
        <h1 style="letter-spacing: 2px; text-transform: uppercase;">Control Panel - Winformation IA</h1>
    </div>

    <div style="display: flex; flex-direction: column; gap: 15px; max-width: 450px; margin: 0 auto; background: #111; padding: 25px; border-radius: 15px; border: 1px solid #333;">
        <input type="text" id="titulo" placeholder="Título del Caramelo (Ej: Premier League)" style="padding: 14px; background: #000; color: #fff; border: 1px solid #d4af37; border-radius: 8px; font-size: 1rem;">
        <textarea id="mensaje" placeholder="Escribe el pronóstico o análisis aquí..." style="padding: 14px; background: #000; color: #fff; border: 1px solid #d4af37; border-radius: 8px; height: 120px; font-size: 1rem;"></textarea>
        <button id="btnEnviar" style="background: #d4af37; color: #000; padding: 18px; font-weight: 900; cursor: pointer; border: none; border-radius: 8px; text-transform: uppercase; font-size: 1rem;">Lanzar al Aplicativo</button>
    </div>

    <script>
        // CONFIGURACIÓN REAL DE TU FIREBASE (Extraída de tus fotos)
        var firebaseConfig = {
            apiKey: "AIzaSyAsS-5Xm09Kk3J-o5f-3vH_N6tSjK9P8",
            authDomain: "winformation-ia.firebaseapp.com",
            databaseURL: "https://winformation-ia-default-rtdb.firebaseio.com",
            projectId: "winformation-ia",
            storageBucket: "winformation-ia.appspot.com",
            messagingSenderId: "30500473215",
            appId: "1:30500473215:web:5d2b67f18b769226c6d267"
        };
        
        // Inicialización del motor
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        var database = firebase.database();

        // Lógica del botón de envío
        document.getElementById('btnEnviar').onclick = function() {
            var t = document.getElementById('titulo').value;
            var m = document.getElementById('mensaje').value;

            if(t === "" || m === "") {
                alert("Camila dice: No puedes enviar campos vacíos, socio.");
                return;
            }

            // Enviando datos a la rama 'caramelos'
            database.ref('caramelos').push({
                titulo: t,
                mensaje: m,
                fecha: new Date().toLocaleString()
            }).then(function() {
                alert("¡Caramelo enviado con éxito al aplicativo!");
                document.getElementById('titulo').value = "";
                document.getElementById('mensaje').value = "";
            }).catch(function(error) {
                alert("Error de conexión: " + error.message);
            });
        };
    </script>
</body>
</html>
