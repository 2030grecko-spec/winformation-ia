<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel - Winformation IA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { background-color: #000; color: #d4af37; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { text-align: center; padding: 25px; width: 100%; border-bottom: 2px solid #222; }
        .camila-img { width: 130px; height: 130px; border-radius: 50%; border: 3px solid #d4af37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); object-fit: cover; }
        .container { width: 90%; max-width: 450px; background: #111; padding: 25px; border-radius: 15px; margin-top: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 15px; }
        input, textarea { background: #050505; border: 1px solid #d4af37; padding: 12px; border-radius: 8px; color: #fff; font-size: 1rem; outline: none; }
        button { background: #d4af37; color: #000; padding: 15px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #fff; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="header">
        <img src="camilaDelfuro.jpg" alt="Camila" class="camila-img">
        <h1 style="letter-spacing: 2px; font-size: 1.3rem; margin-top: 10px;">BÚNKER DE CONTROL</h1>
    </div>

    <div class="container">
        <input type="text" id="titulo" placeholder="Título del Caramelo">
        <textarea id="mensaje" placeholder="Escribe el análisis para los cazadores..." style="height: 100px;"></textarea>
        <button id="btnEnviar">LANZAR AL APLICATIVO</button>
    </div>

    <script>
        // CONFIGURACIÓN REAL DE FIREBASE (SACADA DE TU FOTO 2061.jpg)
        var firebaseConfig = {
            apiKey: "AIzaSyAsS-5Xm09Kk3J-o5f-3vH_N6tSjK9P8",
            authDomain: "winformation-ia.firebaseapp.com",
            databaseURL: "https://winformation-ia-default-rtdb.firebaseio.com",
            projectId: "winformation-ia",
            storageBucket: "winformation-ia.appspot.com",
            messagingSenderId: "30500473215",
            appId: "1:30500473215:web:5d2b67f18b769226c6d267"
        };
        
        // Inicializar Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        var database = firebase.database();

        // Función para enviar los datos
        document.getElementById('btnEnviar').onclick = function() {
            var title = document.getElementById('titulo').value;
            var msg = document.getElementById('mensaje').value;

            if(title == "" || msg == "") {
                alert("Error: No puedes enviar campos vacíos.");
                return;
            }

            // Enviando a la rama 'caramelos'
            database.ref('caramelos').push({
                titulo: title,
                mensaje: msg,
                fecha: new Date().toLocaleString()
            }).then(function() {
                alert("¡Caramelo enviado con éxito!");
                document.getElementById('titulo').value = "";
                document.getElementById('mensaje').value = "";
            }).catch(function(error) {
                alert("Error de Firebase: " + error.message);
            });
        };
    </script>
</body>
</html>
