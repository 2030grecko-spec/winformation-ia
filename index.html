<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA - Panel</title>
    <style>
        body { background-color: #000; color: #39ff14; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        .container { background-color: #111; border: 2px solid #39ff14; border-radius: 20px; padding: 25px; width: 90%; max-width: 400px; box-shadow: 0 0 20px #39ff14; margin-top: 20px; }
        .avatar-frame { width: 220px; height: 220px; border-radius: 50%; border: 4px solid #39ff14; margin: 0 auto 15px; overflow: hidden; box-shadow: 0 0 15px #39ff14; background-color: #222; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-size: 26px; letter-spacing: 2px; text-shadow: 0 0 10px #39ff14; }
        textarea { width: 100%; height: 100px; background: #000; border: 1px solid #39ff14; color: #fff; border-radius: 10px; padding: 10px; margin: 15px 0; box-sizing: border-box; }
        .btn { background-color: #39ff14; color: #000; border: none; padding: 18px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <h1>WINFORMATION IA</h1>
    <div class="container">
        <div class="avatar-frame">
            <img src="https://raw.githubusercontent.com/2030grecko-spec/winformation-ia/main/536.jpg" alt="Camila">
        </div>
        <h3 style="color: #fff; margin: 5px;">ADMIN: GRECO</h3>
        <textarea id="datos" placeholder="Ingresa datos para la nube..."></textarea>
        <button class="btn" onclick="enviar()">ENVIAR A LA NUBE</button>
    </div>
    <script>
        function enviar() {
            alert('DATOS ENVIADOS CON ÉXITO A LA NUBE');
            document.getElementById('datos').value = '';
        }
    </script>
</body>
</html>
