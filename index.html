<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Winformation IA</title>
    <style>
        /* Ajuste total para que nada se salga de la pantalla del móvil */
        body { background-color: #24292e; margin: 0; font-family: monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Reducimos la zona de Camila al 35% para que los botones suban */
        .impact-zone { 
            width: 100%; 
            height: 35%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #2d333b; 
            border-bottom: 3px solid #3fb950; 
        }
        .impact-zone img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .control-panel { flex: 1; background: #1c2128; padding: 8px; display: flex; flex-direction: column; overflow: hidden; }
        
        .console-screen { 
            background: #0d1117; 
            border: 2px solid #3fb950; 
            border-radius: 8px; 
            padding: 8px; 
            font-size: 13px; 
            color: #58a6ff; 
            overflow-y: auto; 
            flex-grow: 1; 
            margin-bottom: 8px; 
        }

        /* Caja de entrada compacta y SIEMPRE visible */
        .input-box { 
            display: flex; 
            gap: 5px; 
            background: #2d333b; 
            padding: 6px; 
            border: 2px solid #3fb950; 
            border-radius: 12px; 
            margin-bottom: 5px;
        }
        input { background: transparent; border: none; color: #fff; flex: 1; padding: 5px; outline: none; font-size: 16px; min-width: 0; }
        
        button { background: #3fb950; border: none; color: #000; padding: 8px 10px; border-radius: 8px; font-weight: bold; font-size: 12px; }
        .btn-clear { background: #f85149; color: #fff; }

        /* Regla de Oro: Si el teclado se abre, Camila se encoge al mínimo */
        @media (max-height: 500px) { 
            .impact-zone { height: 15%; } 
            .console-screen { font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="impact-zone">
        <img src="./CamilaDelfuro.jpg" alt="Winformation IA">
    </div>
    <div class="control-panel">
        <div class="console-screen" id="log">
            <div style="color: #3fb950;">> WINFORMATION VINCULADO...</div>
        </div>
        <div class="input-box">
            <input type="text" id="command" placeholder="ESCRIBE AQUÍ..." autocomplete="off">
            <button onclick="send()">OK</button>
            <button class="btn-clear" onclick="borrar()">🗑️</button>
        </div>
    </div>

    <script>
        const log = document.getElementById('log');
        const cmd = document.getElementById('command');

        function send() {
            if(cmd.value.trim() !== "") {
                log.innerHTML += `<div style="color:#58a6ff">> ${cmd.value}</div>`;
                cmd.value = "";
                log.scrollTop = log.scrollHeight;
            }
        }

        function borrar() {
            log.innerHTML = `<div style="color: #3fb950;">> MEMORIA LIMPIA...</div>`;
        }

        /* Permite enviar con la tecla "Entrar" del teclado móvil */
        cmd.addEventListener("keypress", function(e) {
            if (e.key === "Enter") send();
        });
    </script>
</body>
</html>
