<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA - Panel</title>
    <style>
        body { background-color: #000; color: #39ff14; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; margin: 0; }
        .panel { background-color: #111; border: 3px solid #39ff14; border-radius: 25px; padding: 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 20px #39ff14; margin-top: 20px; }
        .foto-camila { width: 200px; height: 200px; border-radius: 50%; border: 4px solid #39ff14; margin: 0 auto 20px; overflow: hidden; box-shadow: 0 0 15px #39ff14; background-color: #222; }
        .foto-camila img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-size: 26px; letter-spacing: 3px; text-shadow: 0 0 10px #39ff14; margin-bottom: 10px; }
        textarea { width: 100%; height: 110px; background: #000; border: 1px solid #39ff14; color: #fff; border-radius: 12px; padding: 12px; margin: 15px 0; box-sizing: border-box; font-size: 16px; }
        .btn { background-color: #39ff14; color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 18px; }
    </style>
</head>
<body>
    <h1>WINFORMATION IA</h1>
    <div class="panel">
        <div class="foto-camila">
            <img src="https://raw.githubusercontent.com/2030grecko-spec/winformation-ia/main/536.jpg" alt="Camila">
        </div>
        <h3 style="color: #fff; margin: 5px;">ADMIN: GRECO</h3>
        <textarea id="texto" placeholder="Ingresa datos aquí..."></textarea>
        <button class="btn" onclick="alert('DATOS ENVIADOS A LA NUBE')">ENVIAR A LA NUBE</button>
    </div>
    <p style="margin-top: 20px; font-size: 12px; color: #39ff14; opacity: 0.7;">SISTEMA OPERADO POR CAMILA IA</p>
</body>
</html>
