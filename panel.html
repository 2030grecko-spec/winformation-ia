<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, orientation=landscape">
    <title>WINFORMATION - PANEL DE CONTROL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #D4AF37; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        .grid-bunker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 50px; height: 100vh; }
        .puerta { border: 1px solid #D4AF37; background: rgba(212,175,55,0.05); display: flex; align-items: center; justify-content: center; text-align: center; cursor: pointer; transition: 0.5s; font-size: 12px; font-weight: 900; }
        .focus-titanes { transform: scale(1.1); box-shadow: 0 0 50px #D4AF37; background: #000 !important; z-index:100; border: 2px solid gold; }
        .camila-bubble { position: fixed; top: 20px; right: 20px; width: 60px; height: 60px; border: 2px solid #D4AF37; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; background: #000; }
    </style>
</head>
<body>

    <div class="camila-bubble">A I</div>

    <div class="grid-bunker">
        <div class="puerta" onclick="window.location.href='https://winformation-ia-production.up.railway.app'">THE LINK (RAILWAY)</div>
        <div class="puerta" id="puerta-titanes">TITAN PROTOCOLS</div>
        <div class="puerta" onclick="probarTelegram()">TEST BOT</div>
        <div class="puerta">ALPHA RADAR</div>
        <div class="puerta">THE VAULT</div>
        <div class="puerta">QUANTUM SIGMA 7</div>
        <div class="puerta">NEURAL SETTINGS</div>
        <div class="puerta">SUPPORT HUB</div>
    </div>

    <script>
        // CONFIGURACIÓN MAESTRA WINFORMATION IA
        const TELEGRAM_TOKEN = "8783010149:AAH7xElctjbUCYYMUIoxPcwwNomLz1RMQ9w";
        const CHAT_ID = "7904878094";
        
        window.onload = () => {
            // Efecto de encendido del búnker
            setTimeout(() => {
                document.getElementById('puerta-titanes').classList.add('focus-titanes');
                alertaWinformation("🎯 WINFORMATION IA: Sistema en línea. Conexión Railway establecida. ¡Plomo al hampa!");
            }, 3000);
        };

        async function alertaWinformation(mensaje) {
            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: mensaje })
                });
            } catch (e) { console.error("Error de conexión"); }
        }

        function probarTelegram() {
            alertaWinformation("🔔 TEST: Señal confirmada desde el Panel de Control de Greco.");
        }
    </script>
</body>
</html>
