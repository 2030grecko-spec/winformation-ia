<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, orientation=landscape">
    <title>WINFORCE - COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #D4AF37; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        
        /* CONTENEDOR DE LAS 7 PUERTAS */
        .grid-bunker {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 50px;
            height: 100vh;
            transition: all 1.5s ease-in-out;
        }

        .puerta {
            border: 1px solid #D4AF37;
            background: rgba(212, 175, 55, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.8rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.5s;
        }

        .puerta:hover { background: rgba(212, 175, 55, 0.2); box-shadow: 0 0 20px #D4AF37; }

        /* EFECTO DE FOCO EN TITANES */
        .focus-titanes {
            transform: scale(1.5);
            z-index: 100;
            box-shadow: 0 0 50px #D4AF37;
            background: #000 !important;
        }

        /* BURBUJA DE CAMILA EN LA ESQUINA */
        .camila-bubble {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border: 2px solid #D4AF37;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            background: #000;
            box-shadow: 0 0 15px #D4AF37;
        }
    </style>
</head>
<body>

    <div class="camila-bubble">A I</div>

    <div class="grid-bunker" id="bunker-grid">
        <div class="puerta">ALPHA RADAR</div>
        <div class="puerta">THE VAULT</div>
        <div class="puerta" id="puerta-titanes">TITAN PROTOCOLS</div>
        <div class="puerta">QUANTUM SIGMA 7</div>
        <div class="puerta">THE LINK</div>
        <div class="puerta">NEURAL SETTINGS</div>
        <div class="puerta">SUPPORT HUB</div>
    </div>

    <script>
        // Sincronía de los 3 segundos
        window.onload = () => {
            console.log("Panel iniciado. Camila vigilando...");
            
            setTimeout(() => {
                const titanes = document.getElementById('puerta-titanes');
                const grid = document.getElementById('bunker-grid');
                
                // Efecto visual de "Entrada a los Titanes"
                titanes.classList.add('focus-titanes');
                
                setTimeout(() => {
                    // Aquí es donde entraría a la sección de los cursos e historias
                    alert("ACCEDIENDO A TITAN PROTOCOLS: El conocimiento de los imperios.");
                    // window.location.href = 'titanes.html'; 
                }, 1500);
            }, 3000); // LOS 3 SEGUNDOS QUE PEDISTE
        };

        // CONECTOR DE TELEGRAM (RELOJ MAESTRO)
        async function enviarAlertaTelegram(mensaje) {
            const botToken = "TU_BOT_TOKEN"; // Aquí va tu token de Telegram
            const chatId = "TU_CHAT_ID";
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${mensaje}`);
        }
    </script>
</body>
</html>
