<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, orientation=landscape">
    <title>WINFORCE - PANEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #000; }
        body { background: var(--bg); color: var(--gold); font-family: 'Orbitron', sans-serif; margin: 0; padding: 20px; overflow-x: auto; }
        
        .grid-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 80vh;
            padding: 20px;
        }

        .puerta {
            border: 2px solid var(--gold);
            width: 220px; /* Ancho suficiente para que la letra no se doble */
            height: 350px; /* Altura de la puerta vertical */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: rgba(212, 175, 55, 0.05);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .puerta:hover { background: rgba(212, 175, 55, 0.2); box-shadow: 0 0 30px var(--gold); }

        .puerta span {
            font-size: 0.9rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            width: 90%; /* Forzamos que el texto use el ancho de la puerta */
        }

        .ai-indicator {
            position: absolute; top: 10px; right: 10px;
            border: 1px solid var(--gold); border-radius: 50%;
            width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem;
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="puerta"><span>THE LINK (RAILWAY)</span></div>
        <div class="puerta" style="border-width: 4px; box-shadow: 0 0 40px var(--gold);">
            <div class="ai-indicator">AI</div>
            <span>TITAN PROTOCOLS</span>
        </div>
        <div class="puerta"><span>TEST BOT</span></div>
        <div class="puerta"><span>ALPHA RADAR</span></div>
    </div>
</body>
</html>
