<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA - Usuario</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .header { border-bottom: 2px solid #ffd700; margin-bottom: 20px; padding-bottom: 10px; }
        .card { background: #1a1a1a; border-radius: 10px; padding: 15px; margin: 10px auto; border-left: 5px solid #ffd700; max-width: 500px; text-align: left; }
        .deporte { color: #ffd700; font-weight: bold; text-transform: uppercase; }
        .analisis { margin-top: 10px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="color: #ffd700;">WINFORMATION IA</h1>
    </div>
    <div id="lista-pronosticos">Cargando jugadas...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA47vU3-MvT6pX7jBvWnL_O6T9_XqI4pI8",
            authDomain: "winformation-ia.firebaseapp.com",
            databaseURL: "https://winformation-ia-default-rtdb.firebaseio.com",
            projectId: "winformation-ia",
            storageBucket: "winformation-ia.appspot.com",
            messagingSenderId: "331980074121",
            appId: "1:331980074121:web:9c2f6d71b4e24391e48545"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('pronosticos');

        db.on('value', (snapshot) => {
            const container = document.getElementById('lista-pronosticos');
            container.innerHTML = "";
            if (!snapshot.exists()) {
                container.innerHTML = "No hay jugadas activas.";
            }
            snapshot.forEach((child) => {
                const data = child.val();
                container.innerHTML += `
                    <div class="card">
                        <div class="deporte">${data.deporte || 'PRONÓSTICO'}</div>
                        <div class="analisis">${data.analisis}</div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
