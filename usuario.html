<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, orientation=landscape">
    <title>WINFORCE - REGISTRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #D4AF37; --bg: #000; }
        body { background: var(--bg); color: var(--gold); font-family: 'Orbitron', sans-serif; text-align: center; margin: 0; padding: 10px; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .user-card { border: 1px solid var(--gold); padding: 20px; border-radius: 15px; width: 80%; max-width: 500px; background: #050505; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        input { background: transparent; border: none; border-bottom: 1px solid var(--gold); color: #fff; width: 45%; padding: 8px; margin: 5px; outline: none; font-size: 0.8rem; }
        .btn-save { background: var(--gold); color: #000; border: none; padding: 12px; font-weight: 900; cursor: pointer; margin-top: 15px; width: 90%; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); }
    </style>
</head>
<body>
    <div class="user-card">
        <h2 style="letter-spacing: 3px; font-size: 1.2rem;">HUNTER PROFILE</h2>
        <input type="text" id="regName" placeholder="NOMBRE">
        <input type="email" id="regEmail" placeholder="EMAIL">
        <input type="password" id="regPass" placeholder="PASS">
        <input type="text" id="regFinger" readonly>
        <button class="btn-save" onclick="guardarEnBunker()">SELLAR CONTRATO</button>
        <div id="status-msg" style="font-size: 0.6rem; margin-top: 10px;">ESPERANDO...</div>
    </div>
    <script>
        const firebaseConfig = { databaseURL: "https://winformation-ia-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        document.getElementById('regFinger').value = "WF-" + Math.random().toString(36).substr(2, 5).toUpperCase();

        async function camilaHabla(mensaje) {
            try {
                const response = await fetch('https://winformation-ia-production.up.railway.app/api/camila/hablar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texto: mensaje })
                });
                const blob = await response.blob();
                const audio = new Audio(URL.createObjectURL(blob));
                await audio.play();
            } catch (e) { console.error(e); }
        }

        function guardarEnBunker() {
            const nombre = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            if(!nombre || !email) { camilaHabla("Datos incompletos."); return; }
            db.ref('Usuarios/' + nombre).set({ email, fingerprint: document.getElementById('regFinger').value, fecha: new Date().toLocaleString() })
            .then(() => { 
                camilaHabla("Bienvenido al búnker, " + nombre + ". Contrato sellado.");
                setTimeout(() => { window.location.href = 'panel.html'; }, 5000);
            });
        }
    </script>
</body>
</html>
