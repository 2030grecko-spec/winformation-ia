<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA - Camila Viva</title>
    <style>
        body { background-color: #000; color: #d4af37; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }

        #escena-portal {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100%; background: #000;
        }

        /* EL PORTAL DE FUEGO */
        .contenedor-camila {
            position: relative; width: 260px; height: 260px;
            border-radius: 50%; border: 6px solid #d4af37;
            box-shadow: 0 0 60px #ffcc00, inset 0 0 40px #d4af37;
            overflow: hidden; transition: 1.5s;
        }

        .camila-img {
            width: 100%; height: 100%; object-fit: cover;
            transition: 0.5s;
        }

        /* ANIMACIÓN: CAMILA HABLANDO (Mueve la zona de la boca) */
        @keyframes gesticular {
            0%, 100% { clip-path: ellipse(100% 100% at 50% 50%); }
            50% { clip-path: ellipse(98% 95% at 50% 52%); } /* Simula apertura leve */
        }
        .hablando { animation: gesticular 0.2s infinite; transform: scale(1.02); }

        /* ANIMACIÓN: PICARDÍA (El guiño/pestañeo) */
        @keyframes guino {
            0%, 90%, 100% { filter: brightness(1); }
            95% { filter: brightness(1.5) contrast(1.2); transform: scale(1.05) rotate(1deg); }
        }
        .picardia { animation: guino 4s infinite; }

        /* BURBUJA MAESTRA (Grande y con el Aro) */
        .burbuja-maestra {
            position: fixed; top: 20px; right: 20px;
            width: 150px; height: 150px; border-radius: 50%;
            border: 4px solid #d4af37; box-shadow: 0 0 30px #d4af37;
            z-index: 9999; cursor: grab; object-fit: cover;
        }

        .btn-inicio { background: #d4af37; color: #000; padding: 20px 60px; border: none; border-radius: 50px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 50px; box-shadow: 0 0 20px #d4af37; }
    </style>
</head>
<body>

    <div id="escena-portal">
        <div id="portal" class="contenedor-camila picardia">
            <img id="camila-img" src="CamilaDelfuro.jpg" class="camila-img" alt="Camila">
        </div>
        
        <div id="interfaz">
            <h1 style="letter-spacing: 6px; margin-top: 30px;">WINFORMATION IA</h1>
            <button class="btn-inicio" onclick="iniciarImpacto()">VINCULAR CON CAMILA</button>
        </div>
    </div>

    <script>
        function iniciarImpacto() {
            const nombre = localStorage.getItem('nombre_cazador') || "Cazador";
            const camila = document.getElementById('camila-img');
            const portal = document.getElementById('portal');
            const interfaz = document.getElementById('interfaz');

            interfaz.style.opacity = '0';
            portal.style.transform = 'scale(1.3)'; // Zoom de impacto

            const mensaje = "Hola " + nombre + ". Soy Camila. He cruzado el tiempo para ser tu guía. No estamos aquí para apostar, estamos aquí para dominar los números. Escucha con atención, porque el búnker de inversión está listo para ti.";
            
            const voz = new SpeechSynthesisUtterance(mensaje);
            voz.lang = 'es-ES';
            voz.rate = 0.85;

            // CUANDO EMPIEZA A HABLAR: Mueve la boca
            voz.onstart = () => { camila.classList.add('hablando'); };

            // CUANDO TERMINA: Se vuelve la burbuja grande
            voz.onend = () => {
                camila.classList.remove('hablando');
                portal.classList.remove('contenedor-camila');
                portal.classList.add('burbuja-maestra');
                document.getElementById('escena-portal').style.background = "transparent";
                interfaz.style.display = 'none';
                
                alert("Entrando al Búnker..."); 
            };

            window.speechSynthesis.speak(voz);
        }
    </script>
</body>
</html>
