<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA</title>
    <style>
        /* FORZAR FONDO NEGRO DESDE EL INICIO */
        html, body { 
            background-color: #000 !important; 
            margin: 0; padding: 0; 
            width: 100%; height: 100%;
            overflow: hidden;
            color: #d4af37;
        }

        #canvas-matrix { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.2; }

        .contenedor-app {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; width: 100%;
            background: #000; /* Asegura que el contenedor sea negro */
        }

        .portal-pro {
            width: 280px; height: 280px; border-radius: 50%;
            border: 4px solid #d4af37; position: relative;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }

        .camila-img { width: 98%; height: 98%; border-radius: 50%; object-fit: cover; }

        .btn-entrar {
            margin-top: 40px; padding: 15px 40px; background: #d4af37; color: #000;
            border: none; border-radius: 30px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <canvas id="canvas-matrix"></canvas>

    <div id="escena" class="contenedor-app">
        <div class="portal-pro">
            <img src="1844.png" class="camila-img" onerror="this.src='https://via.placeholder.com/280/000000/d4af37?text=Error+Imagen'">
        </div>
        <h1 style="margin-top:20px;">WINFORMATION IA</h1>
        <button class="btn-entrar" onclick="iniciarVoz()">Activar Búnker</button>
    </div>

    <script>
        // Matrix Dorado Simple para evitar errores de carga
        const canvas = document.getElementById("canvas-matrix");
        const ctx = canvas.getContext("2d");
        canvas.height = window.innerHeight; canvas.width = window.innerWidth;
        const letras = "01WINFORMATION".split("");
        const drops = Array(Math.floor(canvas.width/15)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#d4af37";
            ctx.font = "15px monospace";
            drops.forEach((y, i) => {
                const text = letras[Math.floor(Math.random() * letras.length)];
                ctx.fillText(text, i * 15, y * 15);
                if (y * 15 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);

        function iniciarVoz() {
            const msj = new SpeechSynthesisUtterance("Protocolo activado. Bienvenida al búnker.");
            msj.lang = 'es-ES';
            window.speechSynthesis.speak(msj);
        }
    </script>
</body>
</html>
