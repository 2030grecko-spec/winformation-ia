<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, orientation=landscape">
    <title>WINFORCE - PERFIL DEL CAZADOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #D4AF37; --bg: #000; }
        body { background: var(--bg); color: var(--gold); font-family: 'Orbitron', sans-serif; text-align: center; margin: 0; padding: 20px; }
        
        .user-card { 
            border: 1px solid var(--gold); padding: 40px; border-radius: 20px; 
            max-width: 400px; margin: 50px auto; background: #050505;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        input { 
            background: transparent; border: none; border-bottom: 1px solid var(--gold); 
            color: #fff; width: 80%; padding: 10px; margin: 15px 0; outline: none; font-family: 'Orbitron';
        }

        .btn-save { 
            background: var(--gold); color: #000; border: none; padding: 15px 30px; 
            font-weight: 900; cursor: pointer; margin-top: 20px; width: 100%;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        #status-msg { font-size: 0.7rem; margin-top: 15px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="user-card">
        <h2 style="letter-spacing: 5px;">HUNTER PROFILE</h2>
        <div id="reloj-brasil" style="font-size: 0.8rem; margin-bottom: 20px;">00:00:00 (BR)</div>

        <input type="text" id="regName" placeholder="NOMBRE REAL">
        <input type="email" id="regEmail" placeholder="EMAIL DE OPERACIONES">
        <input type="password" id="regPass" placeholder="PASSWORD">
        <input type="text" id="regFinger" placeholder="FINGERPRINT ID" readonly>

        <button class="btn-save" onclick="guardarEnBunker()">SELLAR CONTRATO</button>
        <div id="status-msg">ESPERANDO ACCIÓN...</div>
    </div>

    <script>
        // CONFIGURACIÓN DE TU BÚNKER (FIREBASE)
        const firebaseConfig = {
            databaseURL: "https://winformation-ia-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Generar una Huella Digital falsa para el estilo
        document.getElementById('regFinger').value = "WF-" + Math.random().toString(36).substr(2, 9).toUpperCase();

        // Sincronía con tu tiempo en Brasil
        setInterval(() => {
            const hora = new Date().toLocaleTimeString("pt-BR");
            document.getElementById('reloj-brasil').innerText = hora + " (BRASIL)";
        }, 1000);

        function guardarEnBunker() {
            const nombre = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const status = document.getElementById('status-msg');

            if(!nombre || !email) {
                status.innerText = "DATOS INCOMPLETOS, CAZADOR.";
                return;
            }

            status.innerText = "CONECTANDO CON EL BÚNKER...";

            // Guardamos en Firebase para que Camila tenga memoria real
            db.ref('Usuarios/' + nombre).set({
                email: email,
                fingerprint: document.getElementById('regFinger').value,
                ultimoAcceso: new Date().toLocaleString("pt-BR")
            }).then(() => {
                status.innerText = "CONTRATO SELLADO. VOLVIENDO AL PANEL...";
                setTimeout(() => { window.location.href = 'panel.html'; }, 2000);
            }).catch(err => {
                status.innerText = "ERROR EN EL ENCRIPTADO.";
                console.error(err);
            });
        }
    </script>
</body>
</html>
