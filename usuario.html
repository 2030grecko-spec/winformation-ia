<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, landscape-only">
    <title>Winformation AI | Registry</title>
    <style>
        body { background: #000; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .camila-reveal { position: absolute; width: 60%; opacity: 0.3; z-index: 1; } /* Aquí irá la imagen de Camila */
        .registration-box { z-index: 10; background: rgba(0,0,0,0.8); padding: 40px; border-radius: 10px; width: 400px; }
        .input-group { margin-bottom: 20px; position: relative; border-bottom: 1px solid #333; }
        input { background: transparent; border: none; color: white; padding: 10px; width: 80%; outline: none; }
        .fang-btn { 
            position: absolute; right: 0; cursor: pointer; width: 30px; height: 30px; 
            background: #D4AF37; clip-path: polygon(50% 100%, 0% 0%, 100% 0%); /* Forma de Colmillo */
            border-bottom: 4px solid #000; /* Punta negra de obsidiana */
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <img src="camila-pose.png" class="camila-reveal" alt="Camila">
    
    <div class="registration-box" id="regBox">
        <h2 style="color: #D4AF37;">Hunter Identity</h2>
        <div class="input-group" id="group1">
            <input type="text" placeholder="Full Name">
            <div class="fang-btn" onclick="revealPart('group1')"></div>
        </div>
        <div class="input-group" id="group2">
            <input type="email" placeholder="Email Address">
            <div class="fang-btn" onclick="revealPart('group2')"></div>
        </div>
        <div class="input-group" id="group3">
            <input type="password" placeholder="Access Password">
            <div class="fang-btn" onclick="finishRegistry()"></div>
        </div>
    </div>

    <script>
        function revealPart(id) {
            const element = document.getElementById(id);
            element.style.transition = "0.5s";
            element.style.opacity = "0";
            setTimeout(() => element.classList.add('hidden'), 500);
            // Aquí Camila se hace más visible en cada click
            document.querySelector('.camila-reveal').style.opacity = parseFloat(document.querySelector('.camila-reveal').style.opacity) + 0.2;
        }

        function finishRegistry() {
            alert("Camila: Welcome to the 1%. The Bunker is yours.");
            location.href = 'panel.html'; // Al panel de las 7 ventanas
        }
    </script>
</body>
</html>
