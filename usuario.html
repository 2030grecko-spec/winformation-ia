<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA - El Portal</title>
    <style>
        body { background-color: #000; color: #d4af37; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }

        /* ESCENA DEL PORTAL */
        #escena-portal {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100%; transition: all 1.5s ease-in-out;
            position: relative; /* Para las letras de Matrix */
        }

        /* CAMILA Y EL PORTAL DE FUEGO */
        .contenedor-camila {
            position: relative; width: 280px; height: 280px;
            border-radius: 50%; 
            /* El aro de fuego inicial con la duración */
            border: 6px solid #d4af37;
            box-shadow: 0 0 60px #ffcc00, inset 0 0 40px #d4af37;
            overflow: hidden; 
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .camila-img {
            width: 100%; height: 100%; object-fit: cover;
            transition: 0.5s;
        }

        /* ANIMACIÓN: CAMILA HABLANDO (Gesticulación Css) */
        @keyframes gesticular {
            0%, 100% { clip-path: ellipse(100% 100% at 50% 50%); }
            50% { clip-path: ellipse(98% 95% at 50% 52%); } /* Simula apertura leve */
        }
        .hablando { animation: gesticular 0.2s infinite; transform: scale(1.02); }

        /* ANIMACIÓN: PICARDÍA (El guiño/pestañeo) */
        @keyframes guino {
            0%, 90%, 100% { filter: brightness(1); }
            95% { filter: brightness(1.5) contrast(1.2); transform: scale(1.05) rotate(1deg); }
        }
        .picardia { animation: guino 4s infinite; }

        /* EFECTO CUANDO EL PORTAL DESAPARECE */
        .portal-desvanecido {
            border: 2px solid #d4af37; /* Borde simple dorado */
            box-shadow: 0 0 15px #d4af37; /* Sombra sutil */
        }

        /* EL FONDO MATRIX QUE APARECE (OCULTO INICIALMENTE) */
        #matrix-datos { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            opacity: 0; transition: opacity 2s; z-index: 1; /* Detrás de Camila */
        }

        /* DISEÑO DE LA BURBUJA GRANDE */
        .burbuja-maestra {
            position: fixed; top: 20px; right: 20px;
            width: 150px; height: 150px; border-radius: 50%;
            border: 4px solid #d4af37; box-shadow: 0 0 30px #d4af37;
            z-index: 9999; cursor: grab; object-fit: cover;
        }

        .btn-entrar { background: #d4af37; color: #000; padding: 20px 60px; border: none; border-radius: 50px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 50px; box-shadow: 0 0 20px #d4af37; z-index: 10; }
    </style>
</head>
<body>

    <div id="escena-portal">
        <div id="portal" class="contenedor-camila picardia">
            <img id="camila-img" src="CamilaProfesional.jpg" class="camila-img" alt="Camila">
        </div>
        
        <canvas id="matrix-datos"></canvas>

        <div id="interfaz">
            <h1 style="letter-spacing: 6px; margin-top: 30px;">WINFORMATION IA</h1>
            <button class="btn-entrar" onclick="iniciarImpacto()">SINCRONIZAR CON CAMILA</button>
        </div>
    </div>

    <script>
        function iniciarImpacto() {
            const nombre = localStorage.getItem('nombre_cazador') || "Inversor";
            const camila = document.getElementById('camila-img');
            const portal = document.getElementById('portal');
            const interfaz = document.getElementById('interfaz');
            const matrix = document.getElementById('matrix-datos');

            interfaz.style.opacity = '0';
            portal.style.transform = 'scale(1.3)'; // Zoom de impacto

            const mensaje = "Hola " + nombre + ". Soy Camila. He cruzado el tiempo para mostrarte el camino de los números. No estamos aquí para apostar, estamos aquí para dominar la inversión profesional. Escucha con atención, porque el búnker de inteligencia está sincronizando los datos.";
            
            const voz = new SpeechSynthesisUtterance(mensaje);
            voz.lang = 'es-ES';
            voz.rate = 0.85;

            // CUANDO EMPIEZA A HABLAR: Gesticulación y Portal Activo
            voz.onstart = () => { camila.classList.add('hablando'); };

            // TEMPORIZADOR DEL ARO DE FUEGO: Desaparece tras 5 segundos (ejemplo)
            setTimeout(() => {
                portal.classList.remove('picardia'); // Detener el guiño inicial
                portal.classList.add('portal-desvanecido'); // Borde simple y sombra sutil
                matrix.style.opacity = '0.3'; // Aparece el fondo Matrix suave
            }, 5000); // 5000 milisegundos = 5 segundos

            // CUANDO TERMINA EL DISCURSO: Camila se vuelve burbuja
            voz.onend = () => {
                camila.classList.remove('hablando');
                portal.classList.remove('contenedor-camila', 'portal-desvanecido');
                portal.classList.add('burbuja-maestra');
                document.getElementById('escena-portal').style.background = "transparent";
                interfaz.style.display = 'none';
                
                alert("Sincronización completada. Accediendo al núcleo de inversión."); 
            };

            window.speechSynthesis.speak(voz);

            // FUNCIÓN DEL EFECTO MATRIX (Dorado)
            iniciarMatrix(matrix);
        }

        // --- LÓGICA DE MATRIX DORADO ---
        function iniciarMatrix(canvas) {
            const ctx = canvas.getContext("2d");
            canvas.height = window.innerHeight; canvas.width = window.innerWidth;
            let letras = "01WINFORMATION"; letras = letras.split("");
            let fontSize = 14; let columns = canvas.width / fontSize;
            let drops = []; for (let x = 0; x < columns; x++) drops[x] = 1;

            function draw() {
                ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "#d4af37"; ctx.font = fontSize + "px monospace";
                for (let i = 0; i < drops.length; i++) {
                    let text = letras[Math.floor(Math.random() * letras.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(draw, 33);
        }
    </script>
</body>
</html>
