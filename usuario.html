<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA - Acceso</title>
    <style>
        body { background-color: #000; color: #d4af37; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .camila-viva {
            width: 180px; height: 180px; border-radius: 50%; border: 4px solid #d4af37;
            box-shadow: 0 0 25px #d4af37; animation: latido 3s infinite ease-in-out; object-fit: cover;
        }
        @keyframes latido {
            0%, 100% { transform: scale(1); box-shadow: 0 0 15px #d4af37; }
            50% { transform: scale(1.05); box-shadow: 0 0 45px #d4af37; }
        }
        .form-cazador { display: flex; flex-direction: column; gap: 15px; width: 85%; max-width: 300px; margin-top: 30px; text-align: center; }
        input { background: #111; border: 1px solid #d4af37; padding: 14px; border-radius: 10px; color: #fff; outline: none; text-align: center; }
        button { background: #d4af37; color: #000; padding: 16px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <img src="CamilaDelfuro.jpg" class="camila-viva" alt="Camila">
    <h1 style="letter-spacing: 3px; margin-top: 15px;">WINFORMATION IA</h1>
    <div class="form-cazador">
        <input type="text" id="nombreCazador" placeholder="Tu Nombre de Cazador">
        <button onclick="entrar()">ENTRAR AL BÚNKER</button>
    </div>
    <script>
        function entrar() {
            const nombre = document.getElementById('nombreCazador').value;
            if (nombre) {
                const voz = new SpeechSynthesisUtterance();
                voz.text = "Hola " + nombre + ", soy Camila. Sincronizando tu acceso al búnker de inteligencia.";
                voz.lang = 'es-ES';
                window.speechSynthesis.speak(voz);
                alert('Sincronizando con Camila... Bienvenido, ' + nombre);
            } else { alert('Camila necesita tu nombre.'); }
        }
    </script>
</body>
</html>
