<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, landscape-only">
    <title>Winformation AI | Registry</title>
    <style>
        body { background: #000; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        .camila-reveal { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0.1; /* Empieza casi invisible */
            z-index: 1; 
            transition: opacity 1s ease-in-out;
        }
        .registration-box { z-index: 10; background: rgba(0,0,0,0.85); padding: 40px; border-radius: 10px; width: 400px; border: 1px solid #333; }
        .input-group { margin-bottom: 25px; position: relative; border-bottom: 2px solid #333; padding-bottom: 5px; }
        input { background: transparent; border: none; color: white; padding: 10px; width: 80%; outline: none; font-size: 1.1rem; }
        .fang-btn { 
            position: absolute; right: 0; top: 5px; cursor: pointer; width: 30px; height: 30px; 
            background: #D4AF37; clip-path: polygon(50% 100%, 0% 0%, 100% 0%); 
            border-bottom: 4px solid #000; 
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- AQUÍ ESTÁ EL CAMBIO: Nombre exacto de tu archivo -->
    <img src="CamilaDelfuro.jpg" class="camila-reveal" alt="Camila">
    
    <div class="registration-box" id="regBox">
        <h2 style="color: #D4AF37; text-align: center;">HUNTER IDENTITY</h2>
        <div class="input-group" id="group1">
            <input type="text" placeholder="Full Name">
            <div class="fang-btn" onclick="revealPart('group1')"></div>
        </div>
        <div class="input-group" id="group2">
            <input type="email" placeholder="Email Address">
            <div class="fang-btn" onclick="revealPart('group2')) "></div>
        </div>
        <div class="input-group" id="group3">
            <input type="password" placeholder="Access Password">
            <div class="fang-btn" onclick="finishRegistry()"></div>
        </div>
    </div>

    <script>
        function revealPart(id) {
            document.getElementById(id).classList.add('hidden');
            const img = document.querySelector('.camila-reveal');
            let op = parseFloat(window.getComputedStyle(img).opacity);
            img.style.opacity = op + 0.3; // Se revela más con cada Colmillo
        }
        function finishRegistry() {
            document.querySelector('.camila-reveal').style.opacity = 1;
            setTimeout(() => { alert("Camila: Welcome to the 1%."); }, 500);
        }
    </script>
</body>
</html>
