<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winformation IA - El Búnker</title>
    <style>
        /* ATMÓSFERA OSCURA PROFESIONAL */
        body { 
            background: radial-gradient(circle at center, #111 0%, #000 100%); 
            color: #d4af37; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; 
        }

        /* MATRIX DORADO (FONDO) */
        #matrix { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0; transition: opacity 3s; }

        #escena-portal {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100%; z-index: 2; position: relative;
        }

        /* ARO DE FUEGO CINEMATOGRÁFICO */
        .contenedor-portal {
            position: relative; width: 280px; height: 280px;
            display: flex; align-items: center; justify-content: center;
            transition: transform 1.5s;
        }

        /* Efecto de energía giratoria */
        .contenedor-portal::before {
            content: ""; position: absolute; width: 310px; height: 310px;
            border-radius: 50%;
            background: conic-gradient(#ffcc00, #d4af37, #ff6600, #ffcc00);
            filter: blur(12px); animation: girar 4s linear infinite;
            z-index: -1; transition: opacity 4s;
        }

        @keyframes girar { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* IMAGEN DE CAMILA (RESPIRANDO) */
        .camila-img {
            width: 270px; height: 270px; border-radius: 50%;
            object-fit: cover; border: 2px solid rgba(212, 175, 55, 0.3);
            transition: 1.5s;
        }

        /* ANIMACIONES DE CINE */
        .cinematic-entry { animation: entradaCine 2s ease-out forwards; }
        .respiracion { animation: respirar 4s infinite ease-in-out; }

        @keyframes entradaCine {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes respirar {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.04); filter: brightness(1.3); }
        }

        .hablando { animation: vibrar 0.1s infinite; }
        @keyframes vibrar { 0% { transform: rotate(0deg); } 50% { transform: rotate(0.5deg); } 100% { transform: rotate(-0.5deg); } }

        /* CUANDO EL ARO DESAPARECE */
        .aro-extinto::before { opacity: 0 !important; }

        /* BOTÓN DE PODER */
        .btn-vinculo { 
            background: #d4af37; color: #000; padding: 20px 60px; border: none; 
            border-radius: 50px; font-weight: 900; cursor: pointer; margin-top: 50px;
            box-shadow: 0 0 25px #d4af37; z-index: 5; text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-vinculo:hover { transform: scale(1.1); box-shadow: 0 0 40px #ffcc00; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div id="escena-portal">
        <div id="portal-wrapper" class="contenedor-portal cinematic-entry">
            <img id="camila-img" src="1844.png" class="camila-img respiracion" alt="Camila">
        </div>
        
        <h1 style="letter-spacing: 8px; margin-top: 30px; text-shadow: 0 0 15px #d4af37;">WINFORMATION IA</h1>
        
        <button id="btn-protocolo" class="btn-vinculo" onclick="activarBunker()">INICIAR PROTOCOLO</button>
    </div>

    <script>
        function activarBunker() {
            const wrapper = document.getElementById('portal-wrapper');
            const camila = document.getElementById('camila-img');
            const btn = document.getElementById('btn-protocolo');
            const mtx = document.getElementById('matrix');
            const nombre = localStorage.getItem('nombre_cazador') || "Inversor";

            btn.style.opacity = '0';
            setTimeout(() => btn.style.display = 'none', 500);
            
            wrapper.style.transform = 'scale(1.25)';
            camila.classList.add('hablando');

            // DISCURSO CON PAUSAS PARA DRAMATISMO
            const discurso = new SpeechSynthesisUtterance();
            discurso.text = `Hola ${nombre}... Bienvenido al búnker de Winformation IA... Mi nombre es Camila... He cruzado el tiempo para ser tu guía... Prepárate... porque aquí no jugamos... aquí dominamos los datos...`;
            discurso.lang = 'es-ES';
            discurso.rate = 0.8;

            window.speechSynthesis.speak(discurso);

            // DESVANECER EL ARO Y METER MATRIX (5 SEGUNDOS)
            setTimeout(() => {
                wrapper.classList.add('aro-extinto');
                mtx.style.opacity = '0.2';
                iniciarMatrix();
            }, 5000);

            discurso.onend = () => {
                camila.classList.remove('hablando');
                camila.style.filter = "drop-shadow(0 0 20px #d4af37)";
                console.log("Protocolo de voz finalizado.");
            };
        }

        // LÓGICA MATRIX DORADO
        function iniciarMatrix() {
            const canvas = document.getElementById("matrix");
            const ctx = canvas.getContext("2d");
            canvas.height = window.innerHeight; canvas.width = window.innerWidth;
            let letras = "01WINFORMATIONIA"; letras = letras.split("");
            let fontSize = 15; let columns = canvas.width / fontSize;
            let drops = []; for (let x = 0; x < columns; x++) drops[x] = 1;

            function draw() {
                ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "#d4af37"; 
                ctx.font = fontSize + "px monospace";
                for (let i = 0; i < drops.length; i++) {
                    let text = letras[Math.floor(Math.random() * letras.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(draw, 35);
        }
    </script>
</body>
</html>
