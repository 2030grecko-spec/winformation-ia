<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Winformation IA - Búnker</title>
    <style>
        /* 1. FORZAR NEGRO TOTAL PARA EVITAR PANTALLA BLANCA */
        html, body { 
            background-color: #000 !important; 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            overflow: hidden; 
            color: #d4af37;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 2. FIX DE LA OTRA IA: EL CANVAS NO DEBE TAPAR EL BOTÓN */
        #matrix-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            opacity: 0.3;
            pointer-events: none; /* Esto permite tocar lo que está detrás */
        }

        /* 3. CAPA VISIBLE (Z-INDEX ALTO) */
        .interfaz-bunker {
            position: relative;
            z-index: 99; /* Por encima del Matrix */
            text-align: center;
            width: 100%;
        }

        .circulo-camila {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 4px solid #d4af37;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.5);
            margin: 0 auto 25px auto;
            overflow: hidden;
            background: #050505; /* Fondo oscuro por si la foto no carga */
        }

        .camila-foto {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .boton-pro {
            background: #d4af37;
            color: #000;
            padding: 18px 45px;
            border: none;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 20px #d4af37;
            letter-spacing: 2px;
        }

        /* TEST DE CARGA: Si ves este texto, el HTML está vivo */
        .debug-text { font-size: 10px; opacity: 0.5; margin-top: 10px; }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="interfaz-bunker">
        <div class="circulo-camila">
            <img src="1844.png" class="camila-foto" id="img-check" 
                 onerror="this.src='https://via.placeholder.com/280/000000/d4af37?text=Buscando+a+Camila'">
        </div>
        
        <h1 style="letter-spacing: 6px; margin-bottom: 30px;">WINFORMATION IA</h1>
        
        <button class="boton-pro" onclick="protocolo()">ACTIVAR PROTOCOLO</button>
        
        <p class="debug-text">Sistema V.3.0 - Estado: Online</p>
    </div>

    <script>
        // FIX DE LA OTRA IA: REDIMENSIÓN REAL PARA MÓVIL
        const canvas = document.getElementById("matrix-canvas");
        const ctx = canvas.getContext("2d");

        function ajustar() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        ajustar();
        window.addEventListener("resize", ajustar);

        const caracteres = "01WINFORMATION".split("");
        const fontSize = 16;
        const columnas = Math.floor(canvas.width / fontSize);
        const gotas = Array(columnas).fill(1);

        function lluvia() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#d4af37";
            ctx.font = fontSize + "px monospace";

            gotas.forEach((y, i) => {
                const char = caracteres[Math.floor(Math.random() * caracteres.length)];
                ctx.fillText(char, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) gotas[i] = 0;
                gotas[i]++;
            });
        }
        setInterval(lluvia, 50);

        function protocolo() {
            alert("Sincronizando búnker...");
            const texto = "Protocolo de inversión activado. Bienvenido Greco.";
            const voz = new SpeechSynthesisUtterance(texto);
            voz.lang = 'es-ES';
            window.speechSynthesis.speak(voz);
        }
    </script>
</body>
</html>
